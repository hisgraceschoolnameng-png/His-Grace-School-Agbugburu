<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 460" width="100%" height="100%">
  <defs>
    <!-- Filter for subtle drop shadow on the shield and ribbon -->
    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.15" />
    </filter>

    <!-- Clip Path for the Shield Outline -->
    <clipPath id="shield-clip">
      <path d="M 75 75 C 120 45 160 55 200 70 C 240 55 280 45 325 75 C 345 180 325 250 200 370 C 75 250 55 180 75 75 Z" />
    </clipPath>

    <!-- Path for the Curved Banner Text -->
    <path id="ribbon-text-path" d="M 55,412 Q 200,448 345,412" />
  </defs>

  <!-- SHIELD GROUP WITH DROP SHADOW -->
  <g filter="url(#drop-shadow)">
    <!-- Base Shield Shape (Clipped Quadrants) -->
    <g clip-path="url(#shield-clip)">
      <!-- Top Quadrant (Royal Blue) -->
      <polygon points="200,210 -50,-50 450,-50" fill="#2b1f85" />
      
      <!-- Right Quadrant (Salmon Coral) -->
      <polygon points="200,210 450,-50 450,450" fill="#ec6e4c" />
      
      <!-- Bottom Quadrant (Green) -->
      <polygon points="200,210 450,450 -50,450" fill="#1b8a4c" />
      
      <!-- Left Quadrant (Cream/Pale Yellow) -->
      <polygon points="200,210 -50,450 -50,-50" fill="#fffde4" />

      <!-- Diagonal Cross Lines (Gold) -->
      <line x1="75" y1="75" x2="325" y2="345" stroke="#f5b041" stroke-width="6" />
      <line x1="325" y1="75" x2="75" y2="345" stroke="#f5b041" stroke-width="6" />

      <!-- ==========================================
           TOP QUADRANT CONTENT: "HGS"
           ========================================== -->
      <text x="145" y="142" transform="rotate(-15, 145, 142)" font-size="44" font-family="'Georgia', 'Times New Roman', serif" font-weight="900" fill="#ffffff" text-anchor="middle">H</text>
      <text x="200" y="152" font-size="60" font-family="'Georgia', 'Times New Roman', serif" font-weight="900" fill="#ffffff" text-anchor="middle">G</text>
      <text x="255" y="142" transform="rotate(15, 255, 142)" font-size="44" font-family="'Georgia', 'Times New Roman', serif" font-weight="900" fill="#ffffff" text-anchor="middle">S</text>

      <!-- ==========================================
           LEFT QUADRANT CONTENT: CAP & SCROLL
           ========================================== -->
      <!-- Graduation Cap -->
      <g transform="translate(5, 5)">
        <path d="M 100,195 L 130,180 L 160,195 L 130,210 Z" fill="#1e293b" stroke="#0f172a" stroke-width="1.5" />
        <path d="M 112,201 L 112,212 C 112,218 148,218 148,212 L 148,201 Z" fill="#1e293b" stroke="#0f172a" stroke-width="1.5" />
        <!-- Tassel -->
        <path d="M 130,195 Q 110,195 105,215" fill="none" stroke="#ef4444" stroke-width="2" />
        <circle cx="105" cy="217" r="3" fill="#ef4444" />
      </g>
      
      <!-- Diploma Scroll -->
      <g transform="translate(5, 2)">
        <rect x="100" y="235" width="50" height="12" rx="3" transform="rotate(-15, 125, 241)" fill="#ffffff" stroke="#0f172a" stroke-width="1.5" />
        <!-- Ribbon tie -->
        <rect x="121" y="233" width="8" height="14" rx="1" transform="rotate(-15, 125, 241)" fill="#ef4444" />
        <path d="M 120,245 L 114,254 M 125,245 L 129,254" stroke="#ef4444" stroke-width="2" stroke-linecap="round" />
      </g>

      <!-- ==========================================
           RIGHT QUADRANT CONTENT: BOOK & PENCIL
           ========================================== -->
      <!-- Open Book -->
      <g transform="translate(5, 5)">
        <path d="M 245,235 C 255,225 270,225 270,235 C 270,225 285,225 295,235 L 295,255 C 285,245 270,245 270,255 C 270,245 255,245 245,255 Z" fill="#ffffff" stroke="#0f172a" stroke-width="1.5" />
        <path d="M 270,235 L 270,255" stroke="#0f172a" stroke-width="1.5" />
        <!-- Pages lines -->
        <path d="M 248,242 C 253,237 263,237 267,242 M 248,248 C 253,243 263,243 267,248 M 273,242 C 277,237 287,237 292,242 M 273,248 C 277,243 287,243 292,248" stroke="#0f172a" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.4" />
      </g>

      <!-- Pencil -->
      <g transform="translate(260, 185) rotate(-35)">
        <rect x="0" y="0" width="30" height="8" rx="1" fill="#f59b24" stroke="#0f172a" stroke-width="1.5" />
        <path d="M 30,0 L 38,4 L 30,8 Z" fill="#fde047" stroke="#0f172a" stroke-width="1.5" />
        <path d="M 35,2.5 L 38,4 L 35,5.5 Z" fill="#0f172a" />
        <rect x="-6" y="0" width="6" height="8" rx="1" fill="#fca5a5" stroke="#0f172a" stroke-width="1.5" /> <!-- Eraser -->
      </g>

      <!-- ==========================================
           BOTTOM QUADRANT CONTENT: SCHOOOL TEXT
           ========================================== -->
      <g transform="translate(0, 5)">
        <text x="200" y="285" font-size="13" font-family="'Poppins', 'Arial', sans-serif" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">HIS GRACE</text>
        <text x="200" y="303" font-size="11" font-family="'Poppins', 'Arial', sans-serif" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">NURSERY &amp; PRIMARY</text>
        <text x="200" y="321" font-size="13" font-family="'Poppins', 'Arial', sans-serif" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">SCHOOL</text>
      </g>
    </g>

    <!-- Outer Gold / Blue Border Frame of the Shield -->
    <path d="M 75 75 C 120 45 160 55 200 70 C 240 55 280 45 325 75 C 345 180 325 250 200 370 C 75 250 55 180 75 75 Z" fill="none" stroke="#2b1f85" stroke-width="8" stroke-linejoin="round" />
    <path d="M 75 75 C 120 45 160 55 200 70 C 240 55 280 45 325 75 C 345 180 325 250 200 370 C 75 250 55 180 75 75 Z" fill="none" stroke="#f5b041" stroke-width="2" stroke-linejoin="round" />

    <!-- ==========================================
         BOTTOM MOTTO BANNER / RIBBON
         ========================================== -->
    <!-- Ribbon Tails (Left & Right) -->
    <!-- Left Tail Fold -->
    <path d="M 50,420 L 30,405 L 40,390 L 50,405 Z" fill="#d97706" stroke="#2b1f85" stroke-width="2" stroke-linejoin="round" />
    <!-- Left Tail End -->
    <path d="M 30,405 L 10,415 L 20,395 L 40,390 Z" fill="#f5b041" stroke="#2b1f85" stroke-width="2" stroke-linejoin="round" />

    <!-- Right Tail Fold -->
    <path d="M 350,420 L 370,405 L 360,390 L 350,405 Z" fill="#d97706" stroke="#2b1f85" stroke-width="2" stroke-linejoin="round" />
    <!-- Right Tail End -->
    <path d="M 370,405 L 390,415 L 380,395 L 360,390 Z" fill="#f5b041" stroke="#2b1f85" stroke-width="2" stroke-linejoin="round" />

    <!-- Main Ribbon Banner Body -->
    <path d="M 45,390 Q 200,430 355,390 L 345,420 Q 200,460 55,420 Z" fill="#f5b041" stroke="#2b1f85" stroke-width="3.5" stroke-linejoin="round" />

    <!-- Ribbon Text along the defined path -->
    <text font-family="'Poppins', 'Arial', sans-serif" font-weight="900" font-size="12" fill="#2b1f85" letter-spacing="1.2">
      <textPath href="#ribbon-text-path" startOffset="50%" text-anchor="middle">
        MOTTO: MOULDING LIVES FOR GREATNESS
      </textPath>
    </text>
  </g>
</svg>
